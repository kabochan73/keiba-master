version: '3.8'

services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: keiba_app
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini
    working_dir: /var/www/html
    depends_on:
      - db
    networks:
      - keiba_network

  web:
    image: nginx:1.25-alpine
    container_name: keiba_web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - keiba_network

  db:
    image: mysql:8.0
    container_name: keiba_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: keiba
      MYSQL_USER: keiba
      MYSQL_PASSWORD: keiba
    volumes:
      - keiba_db_data:/var/lib/mysql
    networks:
      - keiba_network
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

networks:
  keiba_network:
    driver: bridge

volumes:
  keiba_db_data:
    driver: local
